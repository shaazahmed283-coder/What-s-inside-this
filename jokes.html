<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Random Joke Generator</title>
  <style>
    :root{--bg1:#ff5f8f;--bg2:#ff9ec4;--card:rgba(255,255,255,.12);--accent:#ff2d75}
    *{box-sizing:border-box}
    body{min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#fff}
    .card{width:90%;max-width:640px;background:var(--card);backdrop-filter:blur(10px);padding:28px;border-radius:14px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    h1{margin:0 0 14px;font-size:24px}
    .joke{min-height:64px;font-size:20px;line-height:1.3;margin:18px 0;}
    .meta{font-size:13px;opacity:.85}
    .controls{display:flex;gap:12px;justify-content:center;margin-top:14px}
    button{background:#fff;color:var(--accent);border:none;padding:10px 16px;border-radius:10px;font-weight:700;cursor:pointer}
    button.secondary{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.18)}
    button:focus{outline:3px solid rgba(255,255,255,.14)}
    .loading{display:inline-block;margin-left:8px}
    .error{color:#ffd1d9;margin-top:8px}
    @media (prefers-reduced-motion:reduce){*{animation:none!important} }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="title">
    <h1 id="title">Random Joke Generator</h1>
    <div id="joke" class="joke" aria-live="polite">Click "Get a Joke" to start — jokes are fetched from JokeAPI (filtered for safe content).</div>
    <div id="meta" class="meta" aria-hidden="true"></div>

    <div class="controls">
      <button id="getJoke">Get a Joke</button>
      <button id="copyBtn" class="secondary" disabled>Copy</button>
    </div>

    <div id="error" class="error" role="alert" aria-live="assertive" style="display:none"></div>
  </main>

<script>
(function(){
  const JOKE_URL = 'https://v2.jokeapi.dev/joke/Any?blacklistFlags=nsfw,religious,political,racist,sexist,explicit&format=json';
  const getJokeBtn = document.getElementById('getJoke');
  const copyBtn = document.getElementById('copyBtn');
  const jokeEl = document.getElementById('joke');
  const metaEl = document.getElementById('meta');
  const errorEl = document.getElementById('error');

  let lastJokeText = '';

  async function fetchJoke(){
    errorEl.style.display = 'none';
    getJokeBtn.disabled = true;
    getJokeBtn.textContent = 'Loading...';

    try{
      const res = await fetch(JOKE_URL, {cache: 'no-store'});
      if(!res.ok) throw new Error('Network response not ok');
      const data = await res.json();

      // JokeAPI returns either type: "single" with .joke or "twopart" with setup & delivery
      let text = '';
      if(data.type === 'single'){
        text = data.joke;
        jokeEl.textContent = text;
      } else if(data.type === 'twopart'){
        // show setup then delivery with a short pause (respect reduced-motion)
        const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        jokeEl.textContent = data.setup;
        text = data.setup + ' \n' + data.delivery;
        if(!prefersReduced){
          await delay(900);
        }
        jokeEl.textContent = data.setup + '\n\n' + data.delivery;
      } else {
        jokeEl.textContent = "Hmm — couldn't parse the joke.";
      }

      metaEl.textContent = `Category: ${data.category} | Type: ${data.type}`;
      metaEl.setAttribute('aria-hidden', 'false');

      lastJokeText = text;
      copyBtn.disabled = false;
    }catch(err){
      console.error(err);
      errorEl.style.display = '';
      errorEl.textContent = 'Failed to fetch a joke — please try again.';
    }finally{
      getJokeBtn.disabled = false;
      getJokeBtn.textContent = 'Get a Joke';
    }
  }

  function delay(ms){return new Promise(r=>setTimeout(r,ms));}

  async function copyJoke(){
    if(!lastJokeText) return;
    try{
      await navigator.clipboard.writeText(lastJokeText);
      copyBtn.textContent = 'Copied!';
      setTimeout(()=>{ copyBtn.textContent = 'Copy'; },1200);
    }catch(e){
      // fallback: select and prompt
      const ta = document.createElement('textarea');
      ta.value = lastJokeText;
      document.body.appendChild(ta);
      ta.select();
      try{ document.execCommand('copy'); copyBtn.textContent = 'Copied!'; }catch(e2){ alert('Copy not supported'); }
      ta.remove();
      setTimeout(()=>{ copyBtn.textContent = 'Copy'; },1200);
    }
  }

  getJokeBtn.addEventListener('click', fetchJoke);
  copyBtn.addEventListener('click', copyJoke);

  // keyboard: allow Enter on focused buttons (native buttons handle this)

  // expose a quick demo fetch on load (commented out)
  // fetchJoke();
})();
</script>
</body>
</html>
